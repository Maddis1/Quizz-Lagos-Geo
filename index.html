<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Die Slums von Lagos</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-color: #f8fafc;
            --primary-neon: #38bdf8;
            --accent-neon: #a855f7;
            --correct-color: #4ade80;
            --wrong-color: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glossy Card Container */
        .quiz-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        inset 0 1px 2px rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* Glossy Highlight-Effekt oben */
        .quiz-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(rgba(255, 255, 255, 0.05), transparent);
            pointer-events: none;
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary-neon), var(--accent-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 6px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 10%;
            background: linear-gradient(to right, var(--primary-neon), var(--accent-neon));
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--primary-neon);
        }

        .question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-color);
            font-size: 15px;
            text-align: left;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-btn:hover:not([disabled]) {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-neon);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
            transform: translateY(-2px);
        }

        /* Status-Styles nach Klick */
        .option-btn.correct {
            background: rgba(74, 222, 128, 0.15) !important;
            border-color: var(--correct-color) !important;
            color: var(--correct-color);
            font-weight: 600;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.2);
        }

        .option-btn.wrong {
            background: rgba(248, 113, 113, 0.15) !important;
            border-color: var(--wrong-color) !important;
            color: var(--wrong-color);
        }

        .next-btn {
            margin-top: 30px;
            width: 100%;
            background: linear-gradient(135deg, var(--primary-neon), var(--accent-neon));
            border: none;
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            display: none;
        }

        .next-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
        }

        /* Ergebnis-Bildschirm */
        .results-screen {
            text-align: center;
            display: none;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid var(--accent-neon);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            margin: 20px auto;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.3);
            color: var(--primary-neon);
        }

        .restart-btn {
            margin-top: 25px;
            background: transparent;
            border: 1px solid var(--primary-neon);
            color: var(--primary-neon);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: var(--primary-neon);
            color: #0f172a;
            box-shadow: 0 0 15px var(--primary-neon);
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-screen">
            <h1>Die Slums von Lagos</h1>
            <div class="subtitle" id="question-counter">Frage 1 von 10</div>
            
            <div class="progress-bar">
                <div class="progress" id="progress-indicator"></div>
            </div>

            <div class="question" id="question-text">Lädt...</div>
            
            <div class="options-list" id="options-container">
                </div>

            <button class="next-btn" id="next-button" onclick="nextQuestion()">Nächste Frage</button>
        </div>

        <div id="results-screen" class="results-screen">
            <h1>Quiz beendet!</h1>
            <p class="subtitle">Hier ist deine Auswertung zum Lagos-Plakat</p>
            
            <div class="score-circle" id="score-display">0/10</div>
            
            <p id="feedback-text" style="margin-bottom: 20px; font-size: 16px;"></p>
            
            <button class="restart-btn" onclick="restartQuiz()">Quiz neustarten</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                q: "Wo genau liegt die Megastadt Lagos?",
                a: ["Im Südwesten von Nigeria an der Atlantikküste", "Im Norden von Nigeria nahe der Sahara", "Im Osten Afrikas am Indischen Ozean"],
                correct: 0
            },
            {
                q: "Wie viele Einwohner hat Lagos laut den Zahlen des Plakats?",
                a: ["Über 10 Millionen", "Über 20 Millionen", "Genau 5 Millionen"],
                correct: 1
            },
            {
                q: "Wie viel Prozent der Menschen leben in Lagos in informellen Siedlungen?",
                a: ["40-50%", "85-90%", "60-70%"],
                correct: 2
            },
            {
                q: "Wie viele Slums gibt es laut den Fakten in Lagos?",
                a: ["Über 100", "Rund 50", "Knapp 10"],
                correct: 0
            },
            {
                q: "Welches der folgenden ist ein im Plakat genanntes Vorurteil (Klischee)?",
                a: ["Der informelle Sektor hält die Stadt am Laufen.", "Es herrscht überall nur Chaos und die Menschen arbeiten nicht.", "Menschen helfen sich gegenseitig."],
                correct: 1
            },
            {
                q: "Was sichert in der Realität der Slums unter anderem das Einkommen?",
                a: ["Werkstätten und Fischfang", "Große internationale Tech-Konzerne", "Reine staatliche Unterstützung"],
                correct: 0
            },
            {
                q: "Welche Rolle spielt der Straßenwandel (Straßenhandel) in den Slums?",
                a: ["Er ist verboten und existiert kaum.", "Er ist für die Wirtschaft und Versorgung wichtig.", "Er wird nur von Touristen genutzt."],
                correct: 1
            },
            {
                q: "Was ist das Besondere am Slum 'Makoko'?",
                a: ["Er besteht nur aus modernen Hochhäusern.", "Er liegt auf dem Wasser und die Häuser stehen auf Stelzen.", "Er liegt unter der Erde."],
                correct: 1
            },
            {
                q: "Wie bewegen sich die Menschen im Stadtteil Makoko hauptsächlich fort?",
                a: ["Mit der U-Bahn", "Auf Booten", "Mit großen Bussen"],
                correct: 1
            },
            {
                q: "Was ist die 'wichtige Erkenntnis' des Plakats über die Slums?",
                a: ["Slums sind reine Problemräume ohne jede Hoffnung.", "Slums zeigen, wie Menschen trotz schwieriger Bedingungen leben, arbeiten und ihre Stadt mitgestalten.", "Die Slums werden bald komplett verschwinden."],
                correct: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const questionTextEl = document.getElementById("question-text");
        const optionsContainerEl = document.getElementById("options-container");
        const questionCounterEl = document.getElementById("question-counter");
        const progressIndicatorEl = document.getElementById("progress-indicator");
        const nextButtonEl = document.getElementById("next-button");
        const quizScreenEl = document.getElementById("quiz-screen");
        const resultsScreenEl = document.getElementById("results-screen");
        const scoreDisplayEl = document.getElementById("score-display");
        const feedbackTextEl = document.getElementById("feedback-text");

        function loadQuestion() {
            const currentQuestion = quizData[currentQuestionIndex];
            
            // UI Updates
            questionCounterEl.innerText = `Frage ${currentQuestionIndex + 1} von ${quizData.length}`;
            progressIndicatorEl.style.width = `${((currentQuestionIndex + 1) / quizData.length) * 100}%`;
            questionTextEl.innerText = currentQuestion.q;
            
            optionsContainerEl.innerHTML = "";
            nextButtonEl.style.display = "none";

            // Optionen mischen oder einfach rendern
            currentQuestion.a.forEach((option, index) => {
                const button = document.createElement("button");
                button.classList.add("option-btn");
                button.innerText = option;
                button.addEventListener("click", () => selectOption(index, button));
                optionsContainerEl.appendChild(button);
            });
        }

        function selectOption(selectedIndex, clickedButton) {
            const currentQuestion = quizData[currentQuestionIndex];
            const allButtons = optionsContainerEl.querySelectorAll(".option-btn");

            // Deaktiviere alle Buttons nach der Auswahl
            allButtons.forEach(btn => btn.disabled = true);

            if (selectedIndex === currentQuestion.correct) {
                clickedButton.classList.add("correct");
                score++;
            } else {
                clickedButton.classList.add("wrong");
                // Zeige die richtige Antwort grün an
                allButtons[currentQuestion.correct].classList.add("correct");
            }

            nextButtonEl.style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizScreenEl.style.display = "none";
            resultsScreenEl.style.display = "block";
            scoreDisplayEl.innerText = `${score}/${quizData.length}`;

            if(score === quizData.length) {
                feedbackTextEl.innerText = "Perfekt! Du hast das Plakat extrem aufmerksam studiert! 🌟";
            } else if(score >= 7) {
                feedbackTextEl.innerText = "Super Leistung! Du hast die wichtigsten Fakten über Lagos verstanden. 👍";
            } else {
                feedbackTextEl.innerText = "Guter Versuch! Schau dir das Plakat noch einmal an und probiere es gleich nochmal. 📖";
            }
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            resultsScreenEl.style.display = "none";
            quizScreenEl.style.display = "block";
            loadQuestion();
        }

        // Inititaler Start
        loadQuestion();
    </script>
</body>
</html>
